<script type="text/babel">
const {useState, useEffect, useRef, useCallback} = React;

// ═══════════════════════════════════════════════
// FIREBASE DB HELPERS
// ═══════════════════════════════════════════════
const Col = {
  clientes:  "clientes",
  pedidos:   "pedidos",
  productos: "productos",
  gastos:    "gastos",
  config:    "config",
  notifs:    "notifs",
};

// Escuchar colección en tiempo real
function useCollection(colName) {
  const [docs, setDocs] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    const unsub = firestore.collection(colName)
      .orderBy("_ts", "desc")
      .onSnapshot(snap => {
        setDocs(snap.docs.map(d => ({ id: d.id, ...d.data() })));
        setLoading(false);
      }, () => setLoading(false));
    return unsub;
  }, [colName]);
  return [docs, loading];
}

// Escuchar documento único
function useDoc(colName, docId) {
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    if (!docId) return;
    const unsub = firestore.collection(colName).doc(docId)
      .onSnapshot(snap => {
        setData(snap.exists ? snap.data() : null);
        setLoading(false);
      }, () => setLoading(false));
    return unsub;
  }, [colName, docId]);
  return [data, loading];
}

// CRUD helpers
const fsAdd    = (col, data)     => firestore.collection(col).add({ ...data, _ts: firebase.firestore.FieldValue.serverTimestamp() });
const fsSet    = (col, id, data) => firestore.collection(col).doc(id).set({ ...data, _ts: firebase.firestore.FieldValue.serverTimestamp() });
const fsUpdate = (col, id, data) => firestore.collection(col).doc(id).update(data);
const fsDelete = (col, id)       => firestore.collection(col).doc(id).delete();
const fsGet    = (col, id)       => firestore.collection(col).doc(id).get();

function Logo({size=60, logoUrl=null}) {
  const src = logoUrl || LOGO_DEFAULT;
  return (
    <img src={src} style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",flexShrink:0}}/>
  );
  return (
    <svg width={size} height={size} viewBox="0 0 200 200">
      <circle cx="100" cy="100" r="100" fill="#f5c800"/>
      <ellipse cx="62" cy="108" rx="32" ry="17" fill="none" stroke="#7a1c2e" strokeWidth="3.5" strokeLinecap="round"/>
      <path d="M34 104 Q55 88 78 93 Q90 96 94 108" fill="none" stroke="#7a1c2e" strokeWidth="3" strokeLinecap="round"/>
      <line x1="46" y1="108" x2="50" y2="99" stroke="#7a1c2e" strokeWidth="2.5" strokeLinecap="round"/>
      <line x1="58" y1="112" x2="62" y2="102" stroke="#7a1c2e" strokeWidth="2.5" strokeLinecap="round"/>
      <polygon points="100,58 108,82 134,82 113,97 121,121 100,106 79,121 87,97 66,82 92,82"
        fill="#d4a017" stroke="#7a1c2e" strokeWidth="3" strokeLinejoin="round"/>
      <line x1="128" y1="96" x2="160" y2="72" stroke="#7a1c2e" strokeWidth="3" strokeLinecap="round"/>
      {[0,1,2,3,4,5].map(i=>{const t=i/5,x=128+t*32,y=96-t*24;return <g key={i}>
        <ellipse cx={x-7} cy={y+4} rx="7" ry="4" fill="none" stroke="#7a1c2e" strokeWidth="2.2" transform={`rotate(-38,${x-7},${y+4})`}/>
        <ellipse cx={x+5} cy={y-3} rx="7" ry="4" fill="none" stroke="#7a1c2e" strokeWidth="2.2" transform={`rotate(38,${x+5},${y-3})`}/>
      </g>;})}
      <text x="100" y="153" textAnchor="middle" fontFamily="'Arial Black',Georgia,serif"
        fontWeight="900" fontSize="21" fill="#7a1c2e" letterSpacing="2.5">LA ESTRELLA</text>
    </svg>
  );
}

// ═══════════════════════════════════════════════
// APP PRINCIPAL
// ═══════════════════════════════════════════════
window.__logoUrl = null;

function App() {
  const [vista, setVista] = useState("login");
  const [clienteActivo, setClienteActivo] = useState(null);
  const [inicializado, setInicializado] = useState(false);

  // Escuchar datos en tiempo real
  const [clientes,  loadingC] = useCollection(Col.clientes);
  const [pedidos,   loadingP] = useCollection(Col.pedidos);
  const [productos, loadingPr]= useCollection(Col.productos);
  const [notifs,    loadingN] = useCollection(Col.notifs);
  const [gastos,    loadingG] = useCollection(Col.gastos);

  // Config como doc único
  const [configData, loadingCfg] = useDoc(Col.config, "main");
  const config = configData || CONFIG_DEFAULT;
  // Sincronizar logo global al cargar
  useEffect(()=>{ window.__logoUrl = config.logoUrl || null; }, [config.logoUrl]);

  const loading = loadingC || loadingP || loadingPr || loadingCfg;

  // Inicializar datos por defecto si Firestore está vacío
  useEffect(() => {
    if (inicializado) return;
    if (loadingPr || loadingCfg) return;
    setInicializado(true);

    // Productos por defecto
    if (productos.length === 0) {
      PRODUCTOS_DEFAULT.forEach(p => fsSet(Col.productos, p.id, p));
    }
    // Config por defecto
    if (!configData) {
      fsSet(Col.config, "main", CONFIG_DEFAULT);
    }
  }, [loadingPr, loadingCfg, inicializado]);

  if (loading) return <Spinner msg="Conectando con la nube..." />;

  // Helpers de guardado
  const save = {
    agregarCliente: async (c) => { await fsSet(Col.clientes, c.rut.replace(/\D/g,""), c); },
    actualizarCliente: async (id, data) => { await fsUpdate(Col.clientes, id, data); },
    eliminarCliente: async (id) => { await fsDelete(Col.clientes, id); },
    agregarProducto: async (p) => { await fsSet(Col.productos, p.id, p); },
    actualizarProducto: async (id, data) => { await fsUpdate(Col.productos, id, data); },
    eliminarProducto: async (id) => { await fsDelete(Col.productos, id); },
    agregarGasto: async (g) => { await fsAdd(Col.gastos, g); },
    eliminarGasto: async (id) => { await fsDelete(Col.gastos, id); },
    actualizarConfig: async (data) => { await fsSet(Col.config, "main", data); },
    marcarNotifLeida: async (id) => { await fsUpdate(Col.notifs, id, {leida: true}); },
    marcarTodasLeidas: async () => {
      const batch = firestore.batch();
      notifs.filter(n=>!n.leida).forEach(n => {
        batch.update(firestore.collection(Col.notifs).doc(n.id), {leida: true});
      });
      await batch.commit();
    },
  };

  const agregarPedido = async (items, comentario, horaEntrega) => {
    const pedidoId = Date.now().toString();
    const nuevo = {
      clienteId: clienteActivo.id,
      clienteNombre: clienteActivo.nombre,
      clienteDireccion: clienteActivo.direccion || "",
      items, comentario, horaEntrega,
      fecha: new Date().toISOString(),
      estado: "pendiente",
      total: items.reduce((s,i)=>s+i.subtotal,0),
    };
    await fsSet(Col.pedidos, pedidoId, nuevo);
    await fsAdd(Col.notifs, {
      tipo: "nuevo_pedido", pedidoId,
      clienteId: clienteActivo.id,
      clienteNombre: clienteActivo.nombre,
      items, leida: false,
      fecha: new Date().toISOString(),
    });
  };

  const cambiarEstado = async (id, estado) => {
    await fsUpdate(Col.pedidos, id, { estado });
    if (estado === "camino") {
      const p = pedidos.find(x=>x.id===id);
      await fsAdd(Col.notifs, {
        tipo: "camino", pedidoId: id,
        clienteId: p.clienteId,
        clienteNombre: p.clienteNombre,
        leida: false,
        fecha: new Date().toISOString(),
      });
    }
  };

  return (
    <div style={{fontFamily:"Georgia,serif",minHeight:"100vh",background:"#fdf8ee"}}>
      {vista==="login" && (
        <Login config={config} clientes={clientes}
          onAdmin={()=>setVista("admin")}
          onCliente={c=>{setClienteActivo(c);setVista("cliente");}}/>
      )}
      {vista==="admin" && (
        <Admin clientes={clientes} pedidos={pedidos} productos={productos}
          notifs={notifs} gastos={gastos} config={config} save={save}
          cambiarEstado={cambiarEstado} onLogout={()=>setVista("login")}/>
      )}
      {vista==="cliente" && clienteActivo && (
        <Cliente
          cliente={clienteActivo}
          productos={productos}
          config={config}
          pedidos={pedidos.filter(p=>p.clienteId===clienteActivo.id)}
          notifs={notifs.filter(n=>n.clienteId===clienteActivo.id && !n.leida)}
          onPedido={agregarPedido}
          onConfirmarRecibido={id=>cambiarEstado(id,"recibido")}
          onMarcarNotifLeida={save.marcarNotifLeida}
          onLogout={()=>setVista("login")}/>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════
// LOGIN
// ═══════════════════════════════════════════════
function Login({config, clientes, onAdmin, onCliente}) {
  const [modo,setModo]=useState(null);
  const [pass,setPass]=useState("");
  const [rut,setRut]=useState("");
  const [err,setErr]=useState("");

  const loginAdmin = () => {
    if (pass === config.adminPass) onAdmin();
    else setErr("Contraseña incorrecta");
  };
  const loginCliente = () => {
    const c = clientes.find(x =>
      x.rut?.replace(/\D/g,"") === rut.replace(/\D/g,"") ||
      x.telefono === rut
    );
    if (c) onCliente(c);
    else setErr("No encontrado. Contacta a la panadería.");
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#1a0a04,#7a1c2e 50%,#c49a20)",
      display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"#fff",borderRadius:26,padding:32,width:"100%",maxWidth:360,
        boxShadow:"0 28px 70px rgba(0,0,0,0.45)",textAlign:"center"}} className="fade">
        <Logo size={100} logoUrl={config.logoUrl}/>
        <h1 style={{color:"#7a1c2e",fontSize:20,margin:"10px 0 3px"}}>Panadería La Estrella</h1>
        <p style={{color:"#c49a20",fontSize:12,margin:"0 0 6px"}}>{config.horario}</p>
        <p style={{color:"#888",fontSize:12,margin:"0 0 24px",fontStyle:"italic"}}>"{config.bienvenida}"</p>

        {!modo && <>
          <button onClick={()=>setModo("cliente")} style={{...S.btn("#f5c800","#7a1c2e"),marginBottom:10,fontSize:16,padding:16}}>
            🛒 Hacer mi Pedido
          </button>
          <button onClick={()=>setModo("admin")} style={S.btn("#7a1c2e")}>⚙️ Administrador</button>
        </>}

        {modo==="admin" && <>
          <p style={{color:"#7a1c2e",fontWeight:"bold",margin:"0 0 12px"}}>Contraseña</p>
          <input type="password" placeholder="••••••" value={pass}
            onChange={e=>setPass(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&loginAdmin()}
            style={S.input}/>
          {err&&<p style={{color:"#e53e3e",fontSize:12,margin:"6px 0"}}>{err}</p>}
          <button onClick={loginAdmin} style={{...S.btn(),marginTop:10}}>Entrar →</button>
          <button onClick={()=>{setModo(null);setErr("");setPass("");}}
            style={{...S.btn("#eee","#666"),marginTop:8,fontSize:13}}>← Volver</button>
        </>}

        {modo==="cliente" && <>
          <p style={{color:"#7a1c2e",fontWeight:"bold",margin:"0 0 12px"}}>Ingresa tu RUT o teléfono</p>
          <input placeholder="Ej: 12.345.678-9" value={rut}
            onChange={e=>setRut(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&loginCliente()}
            style={S.input}/>
          {err&&<p style={{color:"#e53e3e",fontSize:12,margin:"6px 0"}}>{err}</p>}
          <button onClick={loginCliente}
            style={{...S.btn("#f5c800","#7a1c2e"),marginTop:10,fontSize:15,padding:14}}>Ver Productos →</button>
          <button onClick={()=>{setModo(null);setErr("");setRut("");}}
            style={{...S.btn("#eee","#666"),marginTop:8,fontSize:13}}>← Volver</button>
        </>}

        <div style={{marginTop:16,padding:"8px 12px",background:"#f0fff4",borderRadius:8,
          fontSize:11,color:"#2d7a4f",display:"flex",alignItems:"center",gap:6,justifyContent:"center"}}>
          <span>🔥</span> Conectado en tiempo real
        </div>
      </div>
    </div>
  );
}

// ─── TAB PEDIDOS ────────────────────────────────
function TabPedidos({pedidos,notifs,save,cambiarEstado}) {
  const [filtro,setFiltro]=useState("todos");
  const nuevos=notifs.filter(n=>!n.leida&&n.tipo==="nuevo_pedido");

  const pedidosFiltrados = filtro==="todos" ? pedidos
    : pedidos.filter(p=>p.estado===filtro);

  const sig = {pendiente:"preparando",preparando:"camino"};

  const eliminarPedido = async (id) => {
    if (confirm("¿Eliminar este pedido? No se puede deshacer.")) {
      await fsDelete(Col.pedidos, id);
    }
  };

  return (
    <div>
      {nuevos.length>0&&(
        <div style={{background:"#fff8dc",border:"2px solid #f5c800",borderRadius:14,padding:14,marginBottom:14}} className="fade">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <strong style={{color:"#7a4f00",fontSize:14}}>🔔 {nuevos.length} pedido(s) nuevo(s)</strong>
            <button onClick={save.marcarTodasLeidas}
              style={{...S.btn("#7a1c2e",undefined,{width:"auto",padding:"5px 12px",fontSize:12})}}>✓ Leído</button>
          </div>
          {nuevos.map(n=>(
            <div key={n.id} style={{background:"#fff",borderRadius:9,padding:10,marginBottom:5,borderLeft:"4px solid #f5c800"}}>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <strong style={{fontSize:13}}>{n.clienteNombre}</strong>
                <span style={{fontSize:11,color:"#aaa"}}>{new Date(n.fecha).toLocaleTimeString("es-CL",{hour:"2-digit",minute:"2-digit"})}</span>
              </div>
              <div style={{fontSize:12,color:"#666",marginTop:3}}>
                {n.items?.map(i=>`${i.nombre} x${i.cantidad}`).join(", ")}
              </div>
            </div>
          ))}
        </div>
      )}

      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {["todos","pendiente","preparando","camino","recibido","cancelado"].map(f=>(
          <button key={f} onClick={()=>setFiltro(f)} style={{
            flex:"0 0 auto",padding:"6px 12px",borderRadius:20,border:"none",
            background:filtro===f?"#7a1c2e":"#eee",
            color:filtro===f?"#fff":"#666",fontSize:12,cursor:"pointer",fontFamily:"Georgia,serif",
            fontWeight:filtro===f?"bold":"normal"}}>
            {f==="todos"?"Todos":(ESTADOS[f]?.icon+" "+ESTADOS[f]?.label)}
          </button>
        ))}
      </div>

      {pedidosFiltrados.length===0 && (
        <div style={{textAlign:"center",color:"#bbb",padding:40,fontSize:14}}>
          No hay pedidos{filtro!=="todos"?" en este estado":""}
        </div>
      )}

      {pedidosFiltrados.map(p=>{
        const est=ESTADOS[p.estado]||ESTADOS.pendiente;
        return (
          <div key={p.id} style={S.card} className="fade">
            <div style={{background:est.color,padding:"8px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{color:est.txt,fontWeight:"bold",fontSize:13}}>{est.icon} {est.label}</span>
              <span style={{color:est.txt,fontSize:11,opacity:0.85}}>
                {new Date(p.fecha).toLocaleString("es-CL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}
              </span>
            </div>
            <div style={{padding:"12px 14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <strong style={{fontSize:14,color:"#3a1a08"}}>{p.clienteNombre}</strong>
                <strong style={{color:"#7a1c2e",fontSize:14}}>${p.total?.toLocaleString("es-CL")}</strong>
              </div>
              {p.clienteDireccion&&<div style={{fontSize:12,color:"#888",marginBottom:4}}>📍 {p.clienteDireccion}</div>}
              {p.horaEntrega&&<div style={{fontSize:12,color:"#e8820a",marginBottom:4}}>🕐 Entrega: {p.horaEntrega}</div>}
              <div style={{fontSize:12,color:"#555",marginBottom:8}}>
                {p.items?.map((i,idx)=>(
                  <span key={idx} style={{display:"inline-block",background:"#fdf8ee",borderRadius:6,
                    padding:"2px 8px",margin:"2px",border:"1px solid #f5c800"}}>
                    {i.nombre} ×{i.cantidad}
                  </span>
                ))}
              </div>
              {p.comentario&&<div style={{fontSize:12,color:"#888",fontStyle:"italic",marginBottom:8}}>
                💬 "{p.comentario}"</div>}
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {sig[p.estado]&&(
                  <button onClick={()=>cambiarEstado(p.id,sig[p.estado])}
                    style={{...S.btn(ESTADOS[sig[p.estado]].color,ESTADOS[sig[p.estado]].txt,
                      {width:"auto",padding:"7px 14px",fontSize:12})}}>
                    {ESTADOS[sig[p.estado]].icon} {ESTADOS[sig[p.estado]].label}
                  </button>
                )}
                {p.estado!=="cancelado"&&p.estado!=="recibido"&&(
                  <button onClick={()=>cambiarEstado(p.id,"cancelado")}
                    style={{...S.btn("#e53e3e",undefined,{width:"auto",padding:"7px 14px",fontSize:12})}}>
                    ✕ Cancelar
                  </button>
                )}
                <button onClick={()=>eliminarPedido(p.id)}
                  style={{...S.btn("#666",undefined,{width:"auto",padding:"7px 14px",fontSize:12})}}>
                  🗑 Eliminar
                </button>
              </div>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ─── TAB CLIENTES ────────────────────────────────
function TabClientes({clientes,pedidos,save}) {
  const [form,setForm]=useState(null);
  const [buscar,setBuscar]=useState("");
  const empty={nombre:"",rut:"",telefono:"",direccion:""};

  const filtrados = clientes.filter(c=>
    c.nombre?.toLowerCase().includes(buscar.toLowerCase()) ||
    c.rut?.includes(buscar) ||
    c.telefono?.includes(buscar)
  );

  const guardar = async () => {
    if (!form.nombre || !form.rut) return alert("Nombre y RUT son obligatorios");
    await save.agregarCliente({...form, _ts: null});
    setForm(null);
  };

  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input value={buscar} onChange={e=>setBuscar(e.target.value)}
          placeholder="🔍 Buscar cliente..." style={{...S.input,flex:1}}/>
        <button onClick={()=>setForm(empty)}
          style={{...S.btn("#f5c800","#7a1c2e",{width:"auto",padding:"11px 16px",fontSize:13,whiteSpace:"nowrap"})}}>
          + Agregar
        </button>
      </div>

      {form && (
        <div style={{...S.card,padding:16,marginBottom:14,border:"2px solid #f5c800"}} className="fade">
          <strong style={{display:"block",marginBottom:12,color:"#7a1c2e"}}>
            {form.rut ? "Editar Cliente" : "Nuevo Cliente"}
          </strong>
          {[["nombre","Nombre completo"],["rut","RUT (ej: 12.345.678-9)"],
            ["telefono","Teléfono"],["direccion","Dirección"]].map(([k,lbl])=>(
            <input key={k} placeholder={lbl} value={form[k]||""}
              onChange={e=>setForm({...form,[k]:e.target.value})}
              style={{...S.input,marginBottom:8}}/>
          ))}
          <div style={{display:"flex",gap:8,marginTop:4}}>
            <button onClick={guardar} style={S.btn()}>💾 Guardar</button>
            <button onClick={()=>setForm(null)} style={S.btn("#eee","#666")}>Cancelar</button>
          </div>
        </div>
      )}

      {filtrados.length===0&&<div style={{textAlign:"center",color:"#bbb",padding:32}}>Sin clientes</div>}

      {filtrados.map(c=>{
        const nPedidos=pedidos.filter(p=>p.clienteId===c.id).length;
        return (

// ─── TAB PRODUCTOS ────────────────────────────────
function TabProductos({productos,save}) {
  const [form,setForm]=useState(null);
  const [subiendo,setSubiendo]=useState(false);
  const fotoRef=useRef();
  const empty={id:"",nombre:"",precio:0,unidad:"kilo",activo:true,foto:null};

  const guardar = async () => {
    if (!form.nombre || !form.precio) return alert("Nombre y precio son obligatorios");
    const id = form.id || form.nombre.toLowerCase().replace(/\s+/g,"-").replace(/[^a-z0-9-]/g,"");
    await save.agregarProducto({...form, id});
    setForm(null);
  };

  const subirFoto = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setSubiendo(true);
    const reader = new FileReader();
    reader.onload = (ev) => {
      // Comprimir la imagen antes de guardar
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement("canvas");
        const MAX = 400;
        let w = img.width, h = img.height;
        if (w > h) { if (w > MAX) { h = h*(MAX/w); w = MAX; } }
        else { if (h > MAX) { w = w*(MAX/h); h = MAX; } }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const base64 = canvas.toDataURL("image/jpeg", 0.7);
        setForm(f=>({...f, foto: base64}));
        setSubiendo(false);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  return (
    <div>
      <button onClick={()=>setForm(empty)}
        style={{...S.btn("#f5c800","#7a1c2e"),marginBottom:14}}>+ Agregar Producto</button>

      {form && (
        <div style={{...S.card,padding:16,marginBottom:14,border:"2px solid #f5c800"}} className="fade">
          <strong style={{display:"block",marginBottom:12,color:"#7a1c2e"}}>
            {form.id ? "Editar Producto" : "Nuevo Producto"}
          </strong>

          {/* FOTO */}
          <div style={{marginBottom:12,textAlign:"center"}}>
            <div onClick={()=>fotoRef.current.click()}
              style={{width:120,height:100,margin:"0 auto 8px",borderRadius:12,overflow:"hidden",
                border:"2px dashed #f5c800",background:"#fdf8ee",cursor:"pointer",
                display:"flex",alignItems:"center",justifyContent:"center"}}>
              {form.foto
                ? <img src={form.foto} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                : <div style={{textAlign:"center",color:"#bbb"}}>
                    <div style={{fontSize:28}}>📷</div>
                    <div style={{fontSize:11}}>Toca para subir foto</div>
                  </div>
              }
            </div>
            <input ref={fotoRef} type="file" accept="image/*" capture="environment"
              onChange={subirFoto} style={{display:"none"}}/>
            <button onClick={()=>fotoRef.current.click()}
              style={{...S.btn("#f5c800","#7a1c2e",{width:"auto",padding:"6px 16px",fontSize:12})}}>
              {subiendo?"⏳ Procesando...":"📷 "+(form.foto?"Cambiar foto":"Subir foto")}
            </button>
            {form.foto&&(
              <button onClick={()=>setForm(f=>({...f,foto:null}))}
                style={{...S.btn("#eee","#999",{width:"auto",padding:"6px 12px",fontSize:11,marginLeft:6})}}>
                ✕ Quitar
              </button>
            )}
          </div>

          <input placeholder="Nombre del producto" value={form.nombre}
            onChange={e=>setForm({...form,nombre:e.target.value})} style={{...S.input,marginBottom:8}}/>
          <input type="number" placeholder="Precio ($)" value={form.precio}
            onChange={e=>setForm({...form,precio:Number(e.target.value)})} style={{...S.input,marginBottom:8}}/>
          <select value={form.unidad} onChange={e=>setForm({...form,unidad:e.target.value})}

      {productos.map(p=>(

              {p.foto

// ─── TAB CAJA ────────────────────────────────
function TabCaja({pedidos,gastos,save}) {
  const [form,setForm]=useState(false);
  const [desc,setDesc]=useState("");
  const [monto,setMonto]=useState("");

  const hoy = new Date().toDateString();
  const ingresos = pedidos.filter(p=>p.estado==="recibido"&&new Date(p.fecha).toDateString()===hoy)
    .reduce((s,p)=>s+p.total,0);
  const egresosHoy = gastos.filter(g=>new Date(g.fecha).toDateString()===hoy)
    .reduce((s,g)=>s+g.monto,0);
  const neto = ingresos - egresosHoy;

  const agregarGasto = async () => {
    if (!desc || !monto) return;
    await save.agregarGasto({descripcion:desc, monto:Number(monto), fecha:new Date().toISOString()});
    setDesc(""); setMonto(""); setForm(false);
  };

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:14}}>
        {[
          {label:"Ingresos Hoy",value:ingresos,color:"#38a169"},
          {label:"Gastos Hoy",value:egresosHoy,color:"#e53e3e"},
          {label:"Neto Hoy",value:neto,color:neto>=0?"#3182ce":"#e53e3e"},
        ].map(x=>(
          <div key={x.label} style={{background:"#fff",borderRadius:12,padding:"12px 10px",
            textAlign:"center",boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
            <div style={{fontSize:10,color:"#aaa",marginBottom:4}}>{x.label}</div>
            <div style={{fontSize:16,fontWeight:"bold",color:x.color}}>
              ${x.value.toLocaleString("es-CL")}
            </div>
          </div>
        ))}
      </div>

      <button onClick={()=>setForm(!form)}
        style={{...S.btn("#e53e3e"),marginBottom:10}}>+ Registrar Gasto</button>

      {form && (
        <div style={{...S.card,padding:14,marginBottom:10,border:"2px solid #e53e3e"}} className="fade">
          <input placeholder="Descripción del gasto" value={desc}
            onChange={e=>setDesc(e.target.value)} style={{...S.input,marginBottom:8}}/>
          <input type="number" placeholder="Monto ($)" value={monto}
            onChange={e=>setMonto(e.target.value)} style={{...S.input,marginBottom:8}}/>
          <div style={{display:"flex",gap:8}}>
            <button onClick={agregarGasto} style={S.btn("#e53e3e")}>💾 Guardar</button>
            <button onClick={()=>setForm(false)} style={S.btn("#eee","#666")}>Cancelar</button>
          </div>
        </div>
      )}

      <strong style={{display:"block",margin:"12px 0 8px",color:"#7a1c2e",fontSize:13}}>Gastos recientes</strong>
      {gastos.slice(0,20).map(g=>(
        <div key={g.id} style={{...S.card,padding:"10px 14px",display:"flex",
          justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:13,color:"#3a1a08"}}>{g.descripcion}</div>
            <div style={{fontSize:11,color:"#aaa"}}>{new Date(g.fecha).toLocaleDateString("es-CL")}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <strong style={{color:"#e53e3e"}}>-${Number(g.monto).toLocaleString("es-CL")}</strong>
            <button onClick={()=>{ if(confirm("¿Eliminar gasto?")) save.eliminarGasto(g.id); }}
              style={{...S.btn("#eee","#999",{width:"auto",padding:"4px 10px",fontSize:11})}}>✕</button>

        </div>

}

// ─── TAB REPORTES ────────────────────────────────
function TabReportes({pedidos,clientes}) {
  const completados = pedidos.filter(p=>p.estado==="recibido");
  const totalVentas = completados.reduce((s,p)=>s+p.total,0);
  const totalPedidos = pedidos.length;
  const pendientes = pedidos.filter(p=>p.estado==="pendiente").length;
  const cancelados = pedidos.filter(p=>p.estado==="cancelado").length;

  // Productos más vendidos
  const conteo = {};
  completados.forEach(p=>p.items?.forEach(i=>{
    conteo[i.nombre]=(conteo[i.nombre]||0)+i.cantidad;
  }));
  const masVendidos = Object.entries(conteo).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Top clientes
  const porCliente = {};
  completados.forEach(p=>{
    porCliente[p.clienteNombre]=(porCliente[p.clienteNombre]||0)+p.total;
  });
  const topClientes = Object.entries(porCliente).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const stat = (label,value,color="#7a1c2e") => (
    <div style={{background:"#fff",borderRadius:12,padding:14,textAlign:"center",
      boxShadow:"0 2px 8px rgba(0,0,0,0.07)"}}>
      <div style={{fontSize:11,color:"#aaa",marginBottom:4}}>{label}</div>
      <div style={{fontSize:20,fontWeight:"bold",color}}>{value}</div>
    </div>
  );

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {stat("Total Ventas","$"+totalVentas.toLocaleString("es-CL"),"#38a169")}
        {stat("Total Pedidos",totalPedidos)}
        {stat("Clientes",clientes.length,"#3182ce")}
        {stat("Cancelados",cancelados,"#e53e3e")}
      </div>

      {masVendidos.length>0&&<>
        <strong style={{display:"block",margin:"0 0 8px",color:"#7a1c2e"}}>🏆 Más Vendidos</strong>
        {masVendidos.map(([nombre,cant],i)=>(
          <div key={nombre} style={{...S.card,padding:"10px 14px",display:"flex",
            justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"#3a1a08"}}>
              {["🥇","🥈","🥉","4️⃣","5️⃣"][i]} {nombre}
            </span>
            <span style={{...S.tag("#f5c800","#7a4f00")}}>{cant} unid.</span>
          </div>
        ))}
      </>}

      {topClientes.length>0&&<>
        <strong style={{display:"block",margin:"14px 0 8px",color:"#7a1c2e"}}>👑 Mejores Clientes</strong>
        {topClientes.map(([nombre,total])=>(
          <div key={nombre} style={{...S.card,padding:"10px 14px",display:"flex",
            justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:13,color:"#3a1a08"}}>{nombre}</span>
            <strong style={{color:"#38a169"}}>${total.toLocaleString("es-CL")}</strong>
          </div>
        ))}
      </>}
    </div>
  );
}

  const [horaEntrega,setHoraEntrega]=useState("");
  const [enviando,setEnviando]=useState(false);
  const [enviado,setEnviado]=useState(false);

  const prods=productos.filter(p=>p.activo);
  const totalItems=Object.values(carrito).reduce((s,v)=>s+v,0);
  const totalPrecio=prods.reduce((s,p)=>s+(carrito[p.id]||0)*p.precio,0);

  const cambiar=(id,delta)=>{
    setCarrito(c=>({...c,[id]:Math.max(0,(c[id]||0)+delta)}));
  };

    const items=prods.filter(p=>carrito[p.id]>0).map(p=>({
      productoId:p.id, nombre:p.nombre, precio:p.precio,
      cantidad:carrito[p.id], subtotal:carrito[p.id]*p.precio

                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                    <button onClick={()=>cambiar(p.id,-1)}
                      style={{width:32,height:32,borderRadius:"50%",border:"2px solid #f5c800",
                        background:"#fff",color:"#7a1c2e",fontSize:18,cursor:"pointer",
                        display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>−</button>
                    <span style={{fontSize:16,fontWeight:"bold",color:"#7a1c2e",minWidth:20,textAlign:"center"}}>
                      {carrito[p.id]||0}
                    </span>
                    <button onClick={()=>cambiar(p.id,1)}
                      style={{width:32,height:32,borderRadius:"50%",border:"none",
                        background:"#f5c800",color:"#7a1c2e",fontSize:18,cursor:"pointer",
                        display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>+</button>
                    {(carrito[p.id]||0)>0&&(
                      <span style={{fontSize:12,color:"#38a169",fontWeight:"bold"}}>
                        = ${((carrito[p.id]||0)*p.precio).toLocaleString("es-CL")}
                      </span>
                    )}
                  </div>
                </div>
              </div>
            </div>
          ))}

          {totalItems>0&&(
            <div style={{...S.card,border:"2px solid #f5c800",padding:16,marginTop:8}} className="fade">
              <strong style={{display:"block",marginBottom:12,color:"#7a1c2e",fontSize:15}}>
                🛒 Tu pedido
              </strong>
              {prods.filter(p=>carrito[p.id]>0).map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",
                  marginBottom:4,fontSize:13,color:"#555"}}>
                  <span>{p.nombre} ×{carrito[p.id]}</span>
                  <span style={{color:"#7a1c2e",fontWeight:"bold"}}>
                    ${(carrito[p.id]*p.precio).toLocaleString("es-CL")}
                  </span>
                </div>
              ))}
              <div style={{borderTop:"2px solid #f5c800",marginTop:8,paddingTop:8,
                display:"flex",justifyContent:"space-between",fontWeight:"bold",fontSize:15}}>
                <span>Total</span>
                <span style={{color:"#7a1c2e"}}>${totalPrecio.toLocaleString("es-CL")}</span>
              </div>
              <input placeholder="🕐 Hora de entrega (ej: 13:30)" value={horaEntrega}
                onChange={e=>setHoraEntrega(e.target.value)} style={{...S.input,marginTop:12,marginBottom:8}}/>
              <textarea placeholder="💬 Comentarios (opcional)" value={comentario}
                onChange={e=>setComentario(e.target.value)}
                style={{...S.input,height:60,resize:"none",marginBottom:10}}/>
              <button onClick={enviarPedido} disabled={enviando}
                style={{...S.btn("#7a1c2e",undefined,{fontSize:16,padding:16})}}>
                {enviando?"⏳ Enviando...":"🛒 Confirmar Pedido →"}
              </button>
            </div>
          )}

          {enviado&&(
            <div style={{background:"#f0fff4",border:"2px solid #38a169",borderRadius:14,
              padding:16,textAlign:"center",marginTop:10}} className="fade">
              <div style={{fontSize:36}}>✅</div>
              <strong style={{color:"#38a169"}}>¡Pedido enviado!</strong>
              <p style={{fontSize:13,color:"#555",marginTop:4}}>
                Te avisaremos cuando vaya en camino
              </p>
            </div>
          )}
        </>}

        {tab==="pedidos" && <>
          {pedidos.length===0&&(
            <div style={{textAlign:"center",color:"#bbb",padding:48,fontSize:14}}>
              Aún no tienes pedidos
            </div>
          )}
          {pedidos.map(p=>{
            const est=ESTADOS[p.estado]||ESTADOS.pendiente;
            return (
              <div key={p.id} style={S.card} className="fade">
                <div style={{background:est.color,padding:"8px 14px",display:"flex",
                  justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{color:est.txt,fontWeight:"bold",fontSize:13}}>{est.icon} {est.label}</span>
                  <span style={{color:est.txt,fontSize:11,opacity:0.85}}>
                    {new Date(p.fecha).toLocaleString("es-CL",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"})}
                  </span>
                </div>
                <div style={{padding:"12px 14px"}}>
                  <div style={{fontSize:13,color:"#555",marginBottom:6}}>
                    {p.items?.map((i,idx)=>(
                      <span key={idx} style={{display:"inline-block",background:"#fdf8ee",
                        borderRadius:6,padding:"2px 8px",margin:"2px",border:"1px solid #f5c800"}}>
                        {i.nombre} ×{i.cantidad}
                      </span>
                    ))}
                  </div>
                  <strong style={{color:"#7a1c2e"}}>${p.total?.toLocaleString("es-CL")}</strong>
                  {p.estado==="camino"&&(
                    <button onClick={()=>onConfirmarRecibido(p.id)}
                      style={{...S.btn("#38a169",undefined,{marginTop:10})}}>
                      ✅ Confirmar que lo recibí
                    </button>
                  )}
                </div>
              </div>
            );
          })}
        </>}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
